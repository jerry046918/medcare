# MedCare Docker Compose Configuration

services:
  medcare:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medcare-app
    ports:
      - "3000:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-key-in-production}
      - PYTHON_CMD=python3
      - PADDLE_OCR_ENABLED=true
    volumes:
      # Persist database
      - medcare-db:/app/server/database
      # Persist uploaded files
      - medcare-uploads:/app/server/uploads
      # PaddleOCR model cache (avoid re-downloading)
      - paddle-models:/root/.paddleocr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  medcare-db:
    name: medcare-database
  medcare-uploads:
    name: medcare-uploads
  paddle-models:
    name: paddleocr-models
